name: "Reusable Build"

permissions:
  contents: read

on:
  workflow_call:
    inputs: 
      config:
        required: true
        type: string
      runtime:
        required: true
        type: string
      runs-on:
        required: false
        type: string
        default: ubuntu-latest

jobs:
  build:
    name: "Build"
    runs-on: ${{ inputs.runs-on }}
    strategy:
      matrix:
        include:
          - project: NumTag
          - project: NumTag.Admin
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6.0.2

      - name: "Setup .NET"
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 10.0.x

      - name: "Build App"
        run: dotnet publish ${{ matrix.project }}/${{ matrix.project }}.csproj -c ${{ inputs.config }} -r ${{ inputs.runtime }} -o ./artifact

      - name: "Upload Artifact"
        uses: actions/upload-artifact@v7.0.0
        with:
          name: ${{ matrix.project }}_${{ inputs.config }}_${{ inputs.runtime }}
          path: artifact/**
