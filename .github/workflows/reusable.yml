name: "Reusable Build"

permissions:
  contents: read

on:
  workflow_call:
    inputs: 
      config:
        required: true
        type: string
      runtime:
        required: true
        type: string

jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@v6.0.2

      - name: "Setup .NET"
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: 10.0.x

      - name: "Build Application"
        run: dotnet publish NumTag/NumTag.csproj -c ${{ inputs.config }} -r ${{ inputs.runtime }} -o ./artifact

      - name: "Upload Artifact"
        uses: actions/upload-artifact@v7.0.0
        with:
          name: NumTag_${{ inputs.config }}_${{ inputs.runtime }}
          path: artifact/**
